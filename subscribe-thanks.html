<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — DataLearn</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2VVPVZMJXG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2VVPVZMJXG');
  </script>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: #090f18;
      color: #e6edf3;
      min-height: 100vh;
    }
    .thankyou-page {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px;
      display: grid;
      gap: 26px;
    }
    .thankyou-panel {
      background: rgba(12, 20, 35, .95);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      padding: 42px 34px;
      box-shadow: 0 36px 90px rgba(0,0,0,.18);
    }
    .thankyou-panel h1 {
      margin: 0 0 18px;
      font-size: clamp(2.4rem, 4vw, 3.2rem);
      line-height: 1.05;
    }
    .thankyou-panel p {
      margin: 0 0 18px;
      color: #c1c9d4;
      line-height: 1.8;
      font-size: 16px;
    }
    .thankyou-panel a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: opacity .18s;
    }
    .thankyou-panel a:hover { opacity: .92; }
  </style>
</head>
<body>
  <main class="thankyou-page">
    <section class="thankyou-panel">
      <h1>You're on the list.</h1>
      <p>Thank you for subscribing to DataLearn updates. Expect lesson announcements, analytics tips, and free resources in your inbox soon.</p>
      <a href="index.html">Return to DataLearn &rarr;</a>
    </section>
  </main>
</body>
</html>
